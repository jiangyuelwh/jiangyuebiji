<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>江月的笔记网站</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <style>
    body{margin:0;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;transition:background .2s,color .2s}
    .login-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{width:100%;max-width:420px;background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:28px;box-shadow:0 16px 40px rgba(15,23,42,.08);transition:background .2s,border-color .2s}
    .login-title{font-size:28px;font-weight:800;color:#0f172a;margin-bottom:8px}
    .login-desc{font-size:14px;color:#64748b;margin-bottom:18px}
    .login-result{min-height:22px;margin-top:12px;font-size:13px;color:#d93025}
    body.dark{background:#0f172a;color:#e5e7eb}
    body.dark .login-card{background:#111827;border-color:#243041}
    body.dark .login-title{color:#e5e7eb}
    body.dark .login-desc{color:#94a3b8}
    body.dark .form-control{background:#0b1220;color:#e5e7eb;border-color:#334155}
    body.dark .form-control::placeholder{color:#64748b}
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-title" id="loginTitle">江月的笔记网站</div>
      <div class="login-desc">该笔记网站已启用统一访问密码，请先验证后进入。</div>
      <input id="loginPassword" class="form-control" type="password" placeholder="请输入访问密码">
      <button id="loginSubmit" class="btn btn-primary w-100 mt-3">进入网站</button>
      <div class="login-result" id="loginResult"></div>
    </div>
  </div>
  <script>
    (async function(){
      try{
        var r=await fetch('/api/settings/public');
        var d=await r.json();
        var profile=(d.settings||{}).profile||{};
        var siteTitle=profile.siteTitle||'江月的笔记网站';
        document.title=siteTitle;
        var titleEl=document.getElementById('loginTitle');
        if(titleEl) titleEl.textContent=siteTitle;
        var theme=((d.settings||{}).appearance||{}).theme||'light';
        document.body.classList.toggle('dark',theme==='dark');
      }catch(e){}
    })();
    document.getElementById('loginSubmit').onclick=async function(){
      var pwd=(document.getElementById('loginPassword').value||'').trim();
      if(!pwd){document.getElementById('loginResult').textContent='请输入密码';return;}
      var next=new URLSearchParams(location.search).get('next')||'/';
      try{
        var r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd,next:next})});
        var d=await r.json();
        if(!d.success){document.getElementById('loginResult').textContent=d.error||'登录失败';return;}
        location.href=d.next||next||'/';
      }catch(e){
        document.getElementById('loginResult').textContent=e.message||'登录失败';
      }
    };
    document.getElementById('loginPassword').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('loginSubmit').click()});
  </script>
</body>
</html>
