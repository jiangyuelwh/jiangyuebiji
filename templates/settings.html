<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>设置</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <link rel="stylesheet" href="/static/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/settings.css">
</head>
<body>
  <div class="settings-shell">
    <div class="settings-head">
      <h1>设置</h1>
      <div class="settings-sub">访问密码、双链、附件与主题</div>
    </div>

    <section class="settings-card">
      <div class="card-title">用户名</div>
      <div class="card-desc">修改网站显示名称，站点标题会自动变成“用户名的笔记网站”。</div>
      <div class="row g-2 mt-1">
        <div class="col-12 col-md-6"><input id="usernameInput" type="text" class="form-control" placeholder="输入用户名"></div>
      </div>
      <div class="mt-3 d-flex gap-2 flex-wrap">
        <button class="btn btn-primary" id="saveUsernameBtn">保存用户名</button>
      </div>
      <div class="result-text" id="profileResult"></div>
    </section>

    <section class="settings-card">
      <div class="card-title">网站访问密码</div>
      <div class="card-desc">启用后，进入网站前先输入统一密码。</div>
      <label class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" id="authEnabled">
        <span class="form-check-label">启用访问密码</span>
      </label>
      <div class="row g-2">
        <div class="col-12 col-md-6"><input id="authPassword" type="password" class="form-control" placeholder="输入新密码"></div>
        <div class="col-12 col-md-6"><input id="authPassword2" type="password" class="form-control" placeholder="再次输入密码"></div>
      </div>
      <div class="mt-3 d-flex gap-2 flex-wrap">
        <button class="btn btn-primary" id="savePasswordBtn">保存密码设置</button>
        <button class="btn btn-outline-secondary" id="logoutBtn">退出登录</button>
      </div>
      <div class="result-text" id="authResult"></div>
    </section>

    <section class="settings-card">
      <div class="card-title">双链路径检查与修复</div>
      <div class="card-desc">检查失效内部链接，并修复可确定的新路径。</div>
      <div class="mt-3 d-flex gap-2 flex-wrap">
        <button class="btn btn-outline-primary" id="scanLinksBtn">检查双链</button>
        <button class="btn btn-outline-secondary" id="repairLinksBtn">修复可确定项</button>
      </div>
      <div class="result-box muted" id="wikiLinksResult">点击上方按钮开始检查。</div>
    </section>

    <section class="settings-card">
      <div class="card-title">无引用附件清理</div>
      <div class="card-desc">扫描未被文章引用的附件，并移入回收站。</div>
      <div class="mt-3 d-flex gap-2 flex-wrap">
        <button class="btn btn-outline-primary" id="scanAssetsBtn">扫描无引用附件</button>
        <button class="btn btn-outline-danger" id="cleanAssetsBtn">移入回收站</button>
      </div>
      <div class="result-box muted" id="assetsResult">点击上方按钮开始扫描。</div>
    </section>

    <section class="settings-card">
      <div class="card-title">暗色模式</div>
      <div class="card-desc">切换整站浅色 / 深色显示模式。</div>
      <div class="d-flex gap-2 flex-wrap mt-3">
        <button class="btn btn-outline-secondary theme-btn" data-theme="light">浅色</button>
        <button class="btn btn-outline-secondary theme-btn" data-theme="dark">深色</button>
      </div>
      <div class="result-text" id="themeResult"></div>
    </section>
  </div>
  <script src="/static/settings.js"></script>
</body>
</html>
