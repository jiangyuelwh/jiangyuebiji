<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>江月个人空间</title>
<link href="/static/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/bootstrap-icons.min.css">
<style>
:root { --sidebar-w: 260px; --header-h: 52px; }
* { box-sizing: border-box; }
html,body { height:100%; margin:0; overflow:hidden; font-size:14px; }
body { background:#f5f6fa; font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }

.header { height:var(--header-h); background:#2c3e50; color:#fff; display:flex; align-items:center; padding:0 16px; gap:12px; flex-shrink:0; }
.header .brand { font-size:16px; font-weight:600; color:#fff; text-decoration:none; }
.header .brand i { color:#3498db; margin-right:6px; }

.main-wrap { display:flex; height:calc(100vh - var(--header-h)); }

/* ── 左边栏 ── */
.sidebar-left { width:var(--sidebar-w); min-width:var(--sidebar-w); background:#fff; border-right:1px solid #e8e8e8; display:flex; flex-direction:column; overflow:hidden; }
.panel-head { padding:10px 14px; font-size:13px; font-weight:600; color:#666; border-bottom:1px solid #f0f0f0; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.dir-tree { flex:1; overflow-y:auto; padding:4px 0; }
.dir-item { cursor:pointer; user-select:none; padding:5px 14px 5px 10px; display:flex; align-items:center; gap:4px; font-size:13px; color:#333; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dir-item:hover { background:#f0f4ff; color:#1a73e8; }
.dir-item.active { background:#e8f0fe; color:#1a73e8; font-weight:500; }
.dir-item.selected { background:#d3e3fd; color:#1a73e8; font-weight:600; outline:2px solid #1a73e8; outline-offset:-2px; border-radius:4px; }
.dir-item i { width:18px; text-align:center; font-size:14px; color:#888; flex-shrink:0; }
.dir-item .arrow { transition:transform .2s; font-size:11px; width:14px; }
.dir-item .arrow.expanded { transform:rotate(90deg); }
.dir-item .name { flex:1; overflow:hidden; text-overflow:ellipsis; }
.dir-children { display:none; }
.dir-children.open { display:block; }
.dir-children .dir-item { padding-left:28px; }
.dir-children .dir-children .dir-item { padding-left:46px; }

/* ── 中间栏 ── */
.center-col { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#fff; }
.toolbar { display:flex; align-items:center; padding:8px 16px; gap:6px; border-bottom:1px solid #e8e8e8; background:#fafafa; flex-shrink:0; flex-wrap:wrap; }
.toolbar .btn { font-size:12px; padding:3px 10px; display:inline-flex; align-items:center; gap:4px; white-space:nowrap; }
.toolbar .btn i { font-size:13px; }
.toolbar .breadcrumb-wrap { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.breadcrumb { margin:0; background:transparent; font-size:13px; padding:0; }
.breadcrumb-item+.breadcrumb-item::before { content:"/"; }
.breadcrumb-item a { color:#1a73e8; cursor:pointer; text-decoration:none; }
.breadcrumb-item a:hover { text-decoration:underline; }

/* ── 文件列表 ── */
.file-table-wrap { flex:1; overflow:auto; }
.file-table { width:100%; border-collapse:collapse; font-size:13px; }
.file-table th { text-align:left; padding:8px 12px; background:#f8f9fa; border-bottom:2px solid #e8e8e8; font-weight:600; color:#555; position:sticky; top:0; white-space:nowrap; }
.file-table td { padding:8px 12px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
.file-table tr:hover { background:#f5f8ff; }
.file-table .file-icon { width:18px; text-align:center; color:#999; margin-right:6px; }
.file-table .file-name { cursor:pointer; color:#1a73e8; display:flex; align-items:center; gap:6px; }
.file-table .file-name:hover { text-decoration:underline; }
.file-table .file-name.dir-name { color:#333; font-weight:500; }
.file-table .file-name.dir-name:hover { color:#1a73e8; }
.file-table .file-actions { white-space:nowrap; }
.file-table .file-actions .btn-link { padding:2px 6px; font-size:13px; color:#888; text-decoration:none; }
.file-table .file-actions .btn-link:hover { color:#1a73e8; }
.file-table .file-actions .btn-del:hover { color:#e74c3c; }
.file-table .num-col { width:40px; text-align:center; color:#999; font-size:12px; }
.file-table .size-col { width:80px; text-align:right; color:#888; }
.file-table .time-col { width:140px; color:#888; }
.file-table .action-col { width:100px; }

/* ── 查看/编辑模式 ── */
.mode-view,.mode-edit { display:none; flex-direction:column; height:100%; }
.mode-view.active,.mode-edit.active { display:flex; }
.view-bar { display:flex; align-items:center; padding:8px 16px; gap:8px; border-bottom:1px solid #e8e8e8; background:#fafafa; flex-shrink:0; }
.view-bar .view-title { font-weight:600; font-size:15px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.view-content { flex:1; overflow:auto; background:#fff; }
.view-content iframe { width:100%; height:100%; border:none; }

/* ── Markdown 编辑工具栏 ── */
.md-toolbar {
  display: flex; align-items: center; padding: 4px 8px; gap: 2px;
  background: #f8f9fa; border-bottom: 1px solid #e8e8e8; flex-wrap: wrap;
  flex-shrink: 0; overflow-x: auto;
}
.md-toolbar .btn-tb {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 30px; padding: 0; border: 1px solid transparent;
  border-radius: 4px; background: transparent; color: #555;
  font-size: 13px; cursor: pointer; transition: all .15s;
}
.md-toolbar .btn-tb:hover { background: #e8ecf1; color: #1a73e8; }
.md-toolbar .tb-divider { display: inline-block; width: 1px; height: 18px; background: #ddd; margin: 0 4px; flex-shrink: 0; }
.md-toolbar .tb-reorder { margin-left: auto; color: #999; }
.md-toolbar .tb-reorder:hover { color: #1a73e8; }

.edit-wrap { display:flex; flex:1; overflow:hidden; }
.edit-md { flex:1; display:flex; flex-direction:column; border-right:1px solid #e8e8e8; }
.edit-md textarea { flex:1; border:none; padding:12px; font-family:"Menlo","Consolas","Source Code Pro",monospace; font-size:13px; line-height:1.6; resize:none; outline:none; }
#cmEditor { flex:1; overflow:auto; }
#cmEditor .cm-editor { height:100%; }
#cmEditor .cm-scroller { overflow:auto; font-family:"Menlo","Consolas","Source Code Pro",monospace; font-size:13px; }
.edit-preview { flex:1; overflow:auto; padding:16px; background:#fff; }
.edit-bar { display:flex; align-items:center; padding:8px 16px; gap:8px; border-bottom:1px solid #e8e8e8; background:#fafafa; flex-shrink:0; }
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#bbb; }
.empty-state i { font-size:48px; margin-bottom:12px; }
.empty-state p { font-size:14px; }

/* ── 响应式 ── */
@media (max-width:768px) {
  :root { --sidebar-w: 260px; --header-h: 40px; }
  .header { font-size:13px; padding:0 10px; }
  .header .brand { font-size:14px; }
  .sidebar-left { position:fixed; top:var(--header-h); left:calc(var(--sidebar-w)*-1); bottom:0; z-index:1000; width:var(--sidebar-w); min-width:auto; transition:left .25s ease; box-shadow:2px 0 12px rgba(0,0,0,.15); display:flex; }
  .sidebar-left.open { left:0; }
  .sidebar-overlay { display:none; position:fixed; inset:0; top:var(--header-h); z-index:999; background:rgba(0,0,0,.35); }
  .sidebar-overlay.show { display:block; }
  .header .sidebar-toggle { display:inline-flex!important; }
  .file-table .time-col,.file-table .size-col { display:none; }
  .toolbar .btn { font-size:11px; padding:2px 6px; }
  .toolbar .btn span { display:none; }
  .toolbar .btn i { font-size:14px; }
  .view-bar { padding:4px 10px; }
  .view-bar .btn { font-size:11px; padding:2px 8px; }
  .view-title { font-size:13px; }
}
@media (min-width:769px) {
  .sidebar-overlay,.header .sidebar-toggle { display:none!important; }
}

/* ── 暗色模式 ── */
:root {
  --bg: #fff; --bg2: #f5f6f7; --bg3: #e8eaed;
  --text: #333; --text2: #666; --border: #e0e0e0;
  --hover: #f0f4ff; --accent: #1a73e8; --accent-bg: #e8f0fe;
}
body.dark {
  --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
  --text: #e0e0e0; --text2: #aaa; --border: #2a2a4a;
  --hover: #1a2744; --accent: #64b5f6; --accent-bg: #1a2744;
}
body.dark .dir-item:hover { background:var(--hover); }
body.dark .file-list { background:var(--bg); }
body.dark .sidebar { background:var(--bg2); border-color:var(--border); }
body.dark .dir-item .name { color:var(--text); }
body.dark .dir-item .arrow { color:var(--text2); }
body.dark .search-box input { background:var(--bg3); color:var(--text); border-color:var(--border); }
body.dark #fileTable td { border-color:var(--border); color:var(--text); }
body.dark #fileTable th { background:var(--bg2); color:var(--text2); }
body.dark .edit-bar { background:var(--bg2); border-color:var(--border); }
body.dark .edit-preview { background:var(--bg); }
body.dark .modal-content { background:var(--bg2); color:var(--text); }
body.dark .btn-outline-secondary { color:var(--text2); border-color:var(--border); }
body.dark .toolbar { background:var(--bg2); border-color:var(--border); }
body.dark .btn-tb { color:var(--text2); }
body.dark .file-item-checkbox { accent-color:var(--accent); }
body.dark .recent-item { color:var(--text2); }
body.dark .recent-item:hover { background:var(--hover); color:var(--accent); }

/* ── 右键菜单 ── */
.context-menu {
  position:fixed; background:#fff; border:1px solid #ddd;
  border-radius:6px; box-shadow:0 4px 16px rgba(0,0,0,.15);
  padding:4px 0; z-index:9999; min-width:160px;
}
.context-menu-item {
  padding:8px 16px; cursor:pointer; font-size:13px; color:#333;
  display:flex; align-items:center; gap:8px;
}
.context-menu-item:hover { background:#f0f4ff; color:#1a73e8; }
.context-menu-item.danger { color:#d93025; }
.context-menu-item.danger:hover { background:#fce8e6; }
body.dark .context-menu { background:#2a2a4a; border-color:#3a3a5a; }
body.dark .context-menu-item { color:#e0e0e0; }
body.dark .context-menu-item:hover { background:#1a2744; color:#64b5f6; }

/* ── 批量操作工具栏 ── */
.batch-bar {
  display:none; align-items:center; gap:8px; padding:8px 12px;
  background:#e8f0fe; border-bottom:1px solid #d2e3fc; font-size:13px;
}
body.dark .batch-bar { background:#1a2744; border-color:#2a3a5a; }
.batch-bar.show { display:flex; }

/* ── 最近打开 ── */
.recent-section { border-top:1px solid var(--border); padding:8px 0; margin-top:4px; }
.recent-title { padding:4px 14px; font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
.recent-item { padding:5px 14px; font-size:12px; color:var(--text2); cursor:pointer; display:flex; align-items:center; gap:6px; }
.recent-item:hover { background:var(--hover); color:var(--accent); }
.recent-item i { font-size:11px; }

/* ── 拖拽 ── */
.file-row.dragging { opacity:.5; }
.dir-item.drag-over { background:#d3e3fd; outline:2px dashed #1a73e8; outline-offset:-2px; }
body.dark .dir-item.drag-over { background:#1a2744; outline-color:#64b5f6; }

/* ── 引用链接 ── */
a.wiki-link { color:var(--accent); text-decoration:none; border-bottom:1px dashed var(--accent); }
a.wiki-link:hover { border-bottom-style:solid; }
a.wiki-link.missing { color:#d93025; border-color:#d93025; }

</style>
</head>
